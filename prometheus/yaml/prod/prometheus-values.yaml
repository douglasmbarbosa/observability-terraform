server:
  persistentVolume:
    enabled: true
    existingClaim: "prometheus-efs-pvc-prod"

  retention: "30d"

  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi

  replicaCount: 2

  podAntiAffinity: "hard"

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

alertmanager:
  enabled: true
  replicaCount: 2
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

nodeExporter:
  enabled: true
  resources:
    limits:
      cpu: 200m
      memory: 50Mi
    requests:
      cpu: 100m
      memory: 30Mi

pushgateway:
  enabled: false

serverFiles:
  prometheus.yml:
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        environment: prod
        cluster: eks-ai-cockpit-prd